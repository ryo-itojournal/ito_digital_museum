<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>伊東お菓子ぃ共和国展示室</title>

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #1a0d13;
      font-family: sans-serif;
    }

    #guide {
      position: fixed;
      top: 14px;
      left: 50%;
      z-index: 10;
      transform: translateX(-50%);
      padding: 9px 17px;
      border-radius: 999px;
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 13px;
      pointer-events: none;

</head>

<body>

<div id="guide">
  店舗カードをクリックすると、将来の店舗詳細ページへ移動できます
</div>

  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"

  <a-light
    type="ambient"
    color="#fff5f8"
    intensity="0.56">
  </a-light>

  <a-light
    type="spot"
    position="-5.85 5.2 -6.5"
    intensity="2"
    angle="32"
    penumbra="0.5">
  </a-light>

  <a-light
    type="spot"
    position="-1.8 5.2 -6.5"

    angle="30"
    penumbra="0.5">
  </a-light>

  <a-light

    position="1.45 5.2 -6.5"
    intensity="1.7"

    penumbra="0.5">
  </a-light>

  <a-light
    type="spot"
    position="4.7 5.2 -6.5"
    intensity="1.7"
    angle="30"
    penumbra="0.5">

  <a-entity position="0 0 5.5">
    <a-camera position="0 1.65 0">
      <a-cursor
        color="#ff9ac0"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
  document.addEventListener('DOMContentLoaded', function () {

    document.querySelectorAll('.clickable').forEach(function (element) {

      element.addEventListener('click', function () {
        const url = element.getAttribute('data-url');
        const target = element.getAttribute('data-target') || '_self';

        if (!url) {
          alert('このページまたはGoogleマップは現在準備中です。');
          return;
        }

        window.open(url, target);
      });

      element.addEventListener('mouseenter', function () {
        element.setAttribute(
          'animation__in',
          'property: scale; to: 1.06 1.06 1.06; dur: 140'
        );
      });

      element.addEventListener('mouseleave', function () {
        element.setAttribute(
          'animation__out',
          'property: scale; to: 1 1 1; dur: 140'
        );
      });

    });

  });
</script>

</body>
</html>
