<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>いとうのいいもの展示室</title>

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #07100d;
      font-family: sans-serif;
    }

    #guide {
      position: fixed;
      top: 14px;
      left: 50%;
      z-index: 10;
      transform: translateX(-50%);
      padding: 9px 17px;
      border-radius: 999px;
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="guide">
  店舗カードをクリックすると、将来の店舗詳細ページへ移動できます
</div>

<a-scene
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  background="color: #07100d">

  <a-assets>
    <img id="department-image" src="../ban_itobrand.jpg">
    <img id="instagram-icon" src="../images.jpg">
    <img id="map-icon" src="../ダウンロード.jpg">

    <!-- 動画を追加する場合 -->
    <!--
    <video id="room-video"
           src="../assets/videos/iimono.mp4"
           preload="auto"
           loop
           muted
           playsinline>
    </video>
    -->

    <!-- 3Dモデルを追加する場合 -->
    <!--
    <a-asset-item
      id="room-model"
      src="../assets/models/iimono.glb">
    </a-asset-item>
    -->
  </a-assets>

  <a-sky color="#07100d"></a-sky>

  <!-- 床 -->
  <a-plane
    position="0 0 -2"
    rotation="-90 0 0"
    width="26"
    height="26"
    color="#14221c"
    material="metalness: 0.58; roughness: 0.2">
  </a-plane>

  <!-- 壁 -->
  <a-box
    position="0 3 -10"
    width="17"
    height="6"
    depth="0.18"
    color="#f4f5f1">
  </a-box>

  <a-box
    position="-8.5 3 -3"
    rotation="0 90 0"
    width="14"
    height="6"
    depth="0.18"
    color="#dce5df">
  </a-box>

  <a-box
    position="8.5 3 -3"
    rotation="0 90 0"
    width="14"
    height="6"
    depth="0.18"
    color="#dce5df">
  </a-box>

  <!-- ガラス -->
  <a-box
    position="-7 3 -3"
    rotation="0 90 0"
    width="12"
    height="5"
    depth="0.04"
    color="#b5ffe0"
    material="transparent: true; opacity: 0.14">
  </a-box>

  <a-box
    position="7 3 -3"
    rotation="0 90 0"
    width="12"
    height="5"
    depth="0.04"
    color="#b5ffe0"
    material="transparent: true; opacity: 0.14">
  </a-box>

  <!-- 天井 -->
  <a-box
    position="0 6 -3"
    width="17"
    height="0.18"
    depth="14"
    color="#101914">
  </a-box>

  <!-- タイトル -->
  <a-box
    position="0 4.95 -9.70"
    width="8"
    height="0.9"
    depth="0.12"
    color="#14291e">
  </a-box>

  <a-text
    value="いとうのいいもの 展示室"
    position="0 5.10 -9.57"
    align="center"
    color="#ffffff"
    width="6.8">
  </a-text>

  <a-text
    value="伊東らしさを伝える、地域ブランドと作り手の物語"
    position="0 4.48 -9.57"
    align="center"
    color="#35453d"
    width="5.8">
  </a-text>

  <!-- 大型モニター -->
  <a-box
    position="-5.85 2.55 -9.65"
    width="3.55"
    height="2.15"
    depth="0.12"
    color="#080b09">
  </a-box>

  <a-image
    src="#department-image"
    position="-5.85 2.55 -9.51"
    width="3.25"
    height="1.82">
  </a-image>

  <a-text
    value="BRAND MOVIE"
    position="-5.85 1.22 -9.49"
    align="center"
    color="#264438"
    width="3.2">
  </a-text>

  <!-- 動画を使う時は上のa-imageの代わりに使用 -->
  <!--
  <a-video
    src="#room-video"
    position="-5.85 2.55 -9.50"
    width="3.25"
    height="1.82">
  </a-video>
  -->

  <!-- 店舗1 -->
  <a-box
    position="-1.8 2.65 -9.58"
    width="2.75"
    height="2.15"
    depth="0.12"
    color="#ffffff"
    class="clickable"
    data-url="">
  </a-box>

  <a-text
    value="宇佐美麦酒"
    position="-1.8 3.10 -9.42"
    align="center"
    color="#14291e"
    width="3.1">
  </a-text>

  <a-text
    value="クラフトビールと&#10;地域素材の魅力"
    position="-1.8 2.55 -9.42"

    color="#405048"
    width="2.65">
  </a-text>

  <a-text
    value="DETAIL"
    position="-1.8 1.88 -9.42"
    align="center"
    color="#148054"
    width="2.3">
  </a-text>

  <!-- 店舗2 -->
  <a-box
    position="1.45 2.65 -9.58"
    width="2.75"
    height="2.15"
    depth="0.12"
    color="#ffffff"
    class="clickable"
    data-url="">
  </a-box>

  <a-text
    value="市川製茶"
    position="1.45 3.10 -9.42"
    align="center"
    color="#14291e"
    width="3.1">
  </a-text>

  <a-text
    value="伊東のお茶と&#10;受け継がれる仕事"
    position="1.45 2.55 -9.42"
    align="center"
    color="#405048"
    width="2.65">
  </a-text>

  <a-text
    value="DETAIL"
    position="1.45 1.88 -9.42"
    align="center"
    color="#148054"
    width="2.3">
  </a-text>

  <!-- 店舗3 -->
  <a-box
    position="4.7 2.65 -9.58"
    width="2.75"
    height="2.15"
    depth="0.12"
    color="#ffffff"
    class="clickable"
    data-url="">
  </a-box>

  <a-text
    value="伊東ブランド事業者"
    position="4.7 3.10 -9.42"
    align="center"
    color="#14291e"
    width="3.1">
  </a-text>

  <a-text
    value="商品・技術・人を&#10;順次追加予定"
    position="4.7 2.55 -9.42"
    align="center"
    color="#405048"
    width="2.65">

  <a-text

    position="4.7 1.88 -9.42"
    align="center"
    color="#148054"
    width="2.3">
  </a-text>

  <!-- 3D展示台 -->
  <a-cylinder
    position="0 0.58 -4.6"
    radius="1.15"
    height="1.15"
    color="#e5ece7"
    material="metalness: 0.4; roughness: 0.25">
  </a-cylinder>

  <a-text
    value="3D MODEL DISPLAY"
    position="0 1.42 -4.6"
    rotation="-18 0 0"
    align="center"
    color="#c9ffe4"
    width="3.5">
  </a-text>

  <!-- 3Dモデルを追加する場合 -->
  <!--
  <a-gltf-model
    src="#room-model"
    position="0 1.3 -4.6"
    scale="0.8 0.8 0.8"
    rotation="0 180 0"
    animation="property: rotation; to: 0 540 0; loop: true; dur: 18000; easing: linear">
  </a-gltf-model>
  -->

  <!-- Instagram -->
  <a-image
    src="#instagram-icon"
    position="6.75 1.15 -9.4"
    width="0.45"
    height="0.45"
    class="clickable"
    data-url="https://www.instagram.com/ito_iimono.brand/?next=%2Fito_jizakana.kingdom%2F&hl=ja"
    data-target="_blank">
  </a-image>

  <!-- Map -->
  <a-image
    src="#map-icon"
    position="7.35 1.15 -9.4"
    width="0.45"
    height="0.45"
    class="clickable"
    data-url=""
    data-target="_blank">
  </a-image>

  <!-- 戻る -->
  <a-box
    position="-6.8 0.65 -9.45"
    width="2.2"
    height="0.48"
    depth="0.08"
    color="#14291e"
    class="clickable"
    data-url="../index.html"
    data-target="_self">
  </a-box>

  <a-text
    value="ENTRANCEへ戻る"
    position="-6.8 0.67 -9.35"
    align="center"
    color="#ffffff"
    width="2.6">
  </a-text>

  <!-- 照明 -->
  <a-light
    type="ambient"
    color="#e9fff4"
    intensity="0.55">
  </a-light>

  <a-light
    type="spot"
    position="-5.85 5.2 -6.5"
    intensity="2"
    angle="32"
    penumbra="0.5">
  </a-light>

  <a-light
    type="spot"
    position="-1.8 5.2 -6.5"
    intensity="1.7"
    angle="30"
    penumbra="0.5">
  </a-light>

  <a-light
    type="spot"
    position="1.45 5.2 -6.5"
    intensity="1.7"
    angle="30"
    penumbra="0.5">
  </a-light>

  <a-light
    type="spot"
    position="4.7 5.2 -6.5"
    intensity="1.7"
    angle="30"
    penumbra="0.5">
  </a-light>

  <!-- カメラ -->
  <a-entity position="0 0 5.5">
    <a-camera position="0 1.65 0">
      <a-cursor
        color="#6affb3"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
  document.addEventListener('DOMContentLoaded', function () {

    document.querySelectorAll('.clickable').forEach(function (element) {

      element.addEventListener('click', function () {
        const url = element.getAttribute('data-url');
        const target = element.getAttribute('data-target') || '_self';

        if (!url) {
          alert('このページまたはGoogleマップは現在準備中です。');
          return;
        }

        window.open(url, target);
      });

      element.addEventListener('mouseenter', function () {
        element.setAttribute(
          'animation__in',
          'property: scale; to: 1.06 1.06 1.06; dur: 140'
        );
      });

      element.addEventListener('mouseleave', function () {
        element.setAttribute(
          'animation__out',
          'property: scale; to: 1 1 1; dur: 140'
        );
      });

    });

  });
</script>

</body>
</html>
