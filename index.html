<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111111;
    }

    .loading-message {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);

</head>

<body>

  <!-- 右の壁 -->

    position="7 2.4 -2"

    width="12"
    height="5.8"
    depth="0.18"
    color="#e9e9e9">

  <!-- 天井 -->

    width="14"

  <a-plane
    position="0 0.012 -2"
    rotation="-90 0 0"
    width="0.06"
    height="12"
    color="#777777"
    material="opacity: 0.35; transparent: true">
  </a-plane>


  <!-- =========================
       タイトル
  ========================== -->

    height="0.75"
    depth="0.08"

  </a-box>

  <!-- =========================
       照明
  ========================== -->

  <a-light

  </a-light>

  <a-light
    type="directional"
    position="0 5 4"
    intensity="0.35">
  </a-light>

  <a-light
    type="spot"
    position="-4.8 4.6 -5.5"
    rotation="-35 0 0"
    intensity="1.2"
    angle="32"

  </a-light>

  <a-light
    type="spot"
    position="-1.6 4.6 -5.5"
    rotation="-35 0 0"
    intensity="1.2"
    angle="32"
    penumbra="0.45">
  </a-light>

  <a-light
    type="spot"
    position="1.6 4.6 -5.5"

  <a-light

    rotation="-35 0 0"
    intensity="1.2"
    angle="32"
    penumbra="0.45">
  </a-light>


  <!-- =========================
       カメラ
  ========================== -->

  <a-entity
    id="cameraRig"
    position="0 0 5">

    <a-camera
      position="0 1.6 0"
      wasd-controls="acceleration: 18"
      look-controls="pointerLockEnabled: false">

      <a-cursor
        color="#ff6600"
        fuse="false"
        raycaster="objects: .clickable">
      </a-cursor>

    </a-camera>

  </a-entity>

</a-scene>


<script>
  document.addEventListener('DOMContentLoaded', function () {

    const clickableElements =
      document.querySelectorAll('.clickable');

    clickableElements.forEach(function (element) {

      element.addEventListener('click', function () {

        const url =
          element.getAttribute('data-url');

        const target =
          element.getAttribute('data-target') || '_self';

        if (!url) {
          return;
        }

        if (url.includes('ここにURL')) {
          alert('GoogleマイマップのURLがまだ設定されていません。');
          return;
        }

        window.open(url, target);
      });


      element.addEventListener('mouseenter', function () {

        element.setAttribute(
          'animation__hoverin',
          {
            property: 'scale',
            to: '1.08 1.08 1.08',
            dur: 150,
            easing: 'easeOutQuad'
          }
        );
      });


      element.addEventListener('mouseleave', function () {

        element.setAttribute(
          'animation__hoverout',
          {
            property: 'scale',
            to: '1 1 1',
            dur: 150,
            easing: 'easeOutQuad'
          }
        );
      });

    });


    const scene =
      document.querySelector('a-scene');

    scene.addEventListener('loaded', function () {

      const message =
        document.getElementById('loadingMessage');

      setTimeout(function () {
        message.style.display = 'none';
      }, 4500);

    });

  });
</script>

</body>
</html>
