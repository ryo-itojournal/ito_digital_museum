<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ITO PEOPLE MUSEUM</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <a-assets>
      <img id="photo1" src="https://ito-cci.or.jp/wp-content/uploads/2023/07/ban_itobrand.jpg">
      <img id="photo2" src="https://ito-cci.or.jp/wp-content/uploads/2023/07/ban_jizakana.jpg">
      <img id="photo3" src="https://ito-cci.or.jp/wp-content/uploads/2023/07/ban_okashi.jpg">
    </a-assets>

    <a-sky color="#f5f1e8"></a-sky>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="20"
      height="20"
      color="#ffffff">
    </a-plane>

    <a-box
      position="0 2 -8"
      width="12"
      height="4.5"
      depth="0.2"
      color="#ffffff">
    </a-box>

    <a-box
      position="-6 2 -2"
      rotation="0 90 0"
      width="12"
      height="4.5"
      depth="0.2"
      color="#ffffff">
    </a-box>

    <a-box
      position="6 2 -2"
      rotation="0 90 0"
      width="12"
      height="4.5"
      depth="0.2"
      color="#ffffff">
    </a-box>

    <a-text
      value="ITO PEOPLE MUSEUM"
      position="0 3.6 -7.85"
      align="center"
      color="#333333"
      width="6">
    </a-text>

    <a-text
      value="伊東のヒト・商品・仕事の裏側を展示するデジタル博物館"
      position="0 3.25 -7.85"
      align="center"
      color="#555555"
      width="5">
    </a-text>

    <a-image
      src="#photo1"
      position="-3.5 2 -7.8"
      width="3"
      height="1.6">
    </a-image>

    <a-image
      src="#photo2"
      position="0 2 -7.8"
      width="3"
      height="1.6">
    </a-image>

    <a-image
      src="#photo3"
      position="3.5 2 -7.8"
      width="3"
      height="1.6">
    </a-image>

    <a-camera position="0 1.6 5"></a-camera>

    <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
    <a-light type="directional" position="0 5 5" intensity="0.6"></a-light>

  </a-scene>
</body>
</html>
