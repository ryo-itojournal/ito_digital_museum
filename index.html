<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 和文書体：真鍮の銘板のような明朝体＋案内用のニュートラルなゴシック体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink-950:#070f13;
      --ink-900:#0b1a20;
      --ink-800:#122a32;
      --teal-700:#16333c;
      --foam-100:#e9efec;
      --brass-300:#ecd48f;
      --brass-500:#c9a227;
      --brass-700:#8a6d22;
      --coral-500:#e2683c;
      --glass-200:rgba(233,239,236,0.9);

      --font-display:'Shippori Mincho', serif;
      --font-ui:'Zen Kaku Gothic New', sans-serif;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin: 0;
      overflow: hidden;
      background: var(--ink-950);
      font-family: var(--font-ui);
    }

    a-scene{ cursor: default; }

    /* ===== ローディング画面 ===== */
    #loading{
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: radial-gradient(120% 90% at 50% 30%, #12262e 0%, #0b1a20 55%, #070f13 100%);
      transition: opacity .7s ease, visibility .7s ease;
    }
    #loading.hide{ opacity: 0; visibility: hidden; pointer-events: none; }
    #loading .mark{
      width: 58px; height: 58px;
      border-radius: 50%;
      border: 1px solid rgba(201,162,39,.45);
      display: flex; align-items: center; justify-content: center;
      color: var(--brass-300);
      font-family: var(--font-display);
      font-size: 22px;
      position: relative;
    }
    #loading .mark::after{
      content:"";
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(201,162,39,.22);
      border-top-color: var(--brass-500);
      animation: spin 1.4s linear infinite;
    }
    #loading .word{
      font-size: 11px;
      letter-spacing: .38em;
      color: rgba(233,239,236,.55);
      text-transform: uppercase;
      padding-left: .38em;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    /* ===== 案内ピル ===== */
    #guide {
      position: fixed;
      top: 20px; left: 50%;
      z-index: 10;
      transform: translateX(-50%) translateY(-6px);
      padding: 11px 22px;
      border: 1px solid rgba(201,162,39,.32);
      border-radius: 999px;
      background: rgba(7,15,19,.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--glass-200);
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: .06em;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
      transition: opacity .8s ease .3s, transform .8s ease .3s;
    }
    #guide.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
    #guide .dot{
      display:inline-block; width: 4px; height: 4px; border-radius: 50%;
      background: var(--brass-500); margin: 0 8px; vertical-align: middle;
    }

    /* ===== 左上ブランドマーク ===== */
    #brandmark{
      position: fixed; top: 20px; left: 22px; z-index: 10;
      display: flex; align-items: center; gap: 10px;
      opacity: 0; transform: translateY(-6px);
      transition: opacity .8s ease .5s, transform .8s ease .5s;
      pointer-events: none;
    }
    #brandmark.show{ opacity: 1; transform: translateY(0); }
    #brandmark .ring{
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid rgba(201,162,39,.5);
      display: flex; align-items: center; justify-content: center;
      color: var(--brass-300);
      font-family: var(--font-display);
      font-size: 13px;
    }
    #brandmark .label{
      color: rgba(233,239,236,.45);
      font-size: 10px;
      letter-spacing: .3em;
      text-transform: uppercase;
    }

    #vignette{
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(120% 100% at 50% 50%, rgba(0,0,0,0) 55%, rgba(4,9,11,.55) 100%);
    }
  </style>
</head>

<script>
  /* =========================================================
     和文ラベル用テクスチャ生成（A-Frame標準フォントは和文を含まないため）
  ========================================================== */
  function makeLabelTexture(text, {
    width = 1024, height = 220, fontSize = 92,
    fontFamily = "'Shippori Mincho', serif", weight = 600,
    color = '#e9efec', letterSpacing = 0.05, align = 'center'
  } = {}) {
    const canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, width, height);
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color;
    ctx.font = `${weight} ${fontSize}px ${fontFamily}`;

    const chars = Array.from(text);
    const spacing = letterSpacing * fontSize;
    let totalWidth = 0;
    chars.forEach((c) => { totalWidth += ctx.measureText(c).width + spacing; });
    totalWidth -= spacing;

    let startX;
    if (align === 'center') startX = width / 2 - totalWidth / 2;
    else if (align === 'left') startX = 24;
    else startX = width - 24 - totalWidth;

    ctx.textAlign = 'left';
    let x = startX;
    chars.forEach((c) => {
      ctx.fillText(c, x, height / 2 + 2);
      x += ctx.measureText(c).width + spacing;
    });
    return canvas.toDataURL('image/png');
  }

  function applyLabel(id, text, opts) {
    const el = document.getElementById(id);
    if (el) el.setAttribute('src', makeLabelTexture(text, opts));
  }

  /* =========================================================
     アイコンバッジ用テクスチャ生成（ライン画のみで自己完結、
     外部アイコン画像ファイルへの依存をなくす）
  ========================================================== */
  function makeIconTexture(type, { size = 160, color = '#ecd48f', stroke = 11 } = {}) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = stroke;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    const c = size / 2;

    if (type === 'instagram') {
      const r = size * 0.32;
      ctx.beginPath();
      roundRect(ctx, size*0.14, size*0.14, size*0.72, size*0.72, size*0.22);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(c, c, r*0.62, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(size*0.72, size*0.28, size*0.045, 0, Math.PI*2);
      ctx.fill();

    } else if (type === 'pin') {
      ctx.beginPath();
      ctx.moveTo(c, size*0.86);
      ctx.bezierCurveTo(size*0.86, size*0.58, size*0.82, size*0.30, c, size*0.14);
      ctx.bezierCurveTo(size*0.18, size*0.30, size*0.14, size*0.58, c, size*0.86);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(c, size*0.40, size*0.13, 0, Math.PI*2);
      ctx.stroke();

    } else if (type === 'globe') {
      ctx.beginPath();
      ctx.arc(c, c, size*0.34, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(c, c, size*0.15, size*0.34, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(size*0.16, c);
      ctx.lineTo(size*0.84, c);
      ctx.stroke();

    } else if (type === 'bag') {
      ctx.beginPath();
      roundRect(ctx, size*0.20, size*0.40, size*0.60, size*0.44, size*0.06);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(size*0.35, size*0.40);
      ctx.bezierCurveTo(size*0.35, size*0.20, size*0.65, size*0.20, size*0.65, size*0.40);
      ctx.stroke();
    }

    return canvas.toDataURL('image/png');
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  async function buildLabels() {
    try {
      await Promise.all([
        document.fonts.load("600 96px 'Shippori Mincho'"),
        document.fonts.load("500 44px 'Zen Kaku Gothic New'")
      ]);
      await document.fonts.ready;
    } catch (e) {}

    applyLabel('label-title', 'ITO PEOPLE MUSEUM', {
      fontFamily: "'Shippori Mincho', serif", fontSize: 88, weight: 600, color: '#ecd48f', letterSpacing: 0.08
    });
    applyLabel('label-subtitle', '伊東のヒト・商品・仕事の裏側を展示するデジタル博物館', {
      fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 40, weight: 500, color: 'rgba(233,239,236,0.55)', letterSpacing: 0.05
    });
    applyLabel('label-iimono', 'いとうのいいもの', { fontSize: 82, weight: 600, color: '#eef3f1' });
    applyLabel('label-jizakana', '伊豆・いとう地魚王国', { fontSize: 70, weight: 600, color: '#eef3f1' });
    applyLabel('label-okashi', '伊東お菓子ぃ共和国', { fontSize: 74, weight: 600, color: '#eef3f1' });
    applyLabel('label-furusato', 'ふるさと納税', { fontSize: 88, weight: 600, color: '#eef3f1' });

    document.querySelectorAll('.icon-badge').forEach((badge) => {
      const type = badge.getAttribute('data-icon');
      const glyph = badge.querySelector('.icon-glyph');
      if (glyph) glyph.setAttribute('src', makeIconTexture(type));
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    buildLabels();

    document.querySelectorAll('.clickable').forEach(function (element) {
      element.addEventListener('click', function () {
        const url = element.getAttribute('data-url');
        const target = element.getAttribute('data-target') || '_self';
        if (!url) { return; }
        window.open(url, target);
      });
      element.addEventListener('mouseenter', function () {
        element.setAttribute('animation__hoverin', 'property: scale; to: 1.08 1.08 1.08; dur: 140');
      });
      element.addEventListener('mouseleave', function () {
        element.setAttribute('animation__hoverout', 'property: scale; to: 1 1 1; dur: 140');
      });
    });

    const guide = document.getElementById('guide');
    const brandmark = document.getElementById('brandmark');
    const loading = document.getElementById('loading');
    const scene = document.querySelector('a-scene');

    function reveal() {
      loading.classList.add('hide');
      requestAnimationFrame(function () {
        guide.classList.add('show');
        brandmark.classList.add('show');
      });
      setTimeout(function () { guide.classList.remove('show'); }, 6500);
    }

    if (scene.hasLoaded) reveal();
    else scene.addEventListener('loaded', reveal);
    setTimeout(reveal, 4500);
  });
</script>
