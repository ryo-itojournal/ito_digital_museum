<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>伊豆・いとう地魚王国 展示室</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene cursor="rayOrigin: mouse" background="color: #111111">

  <a-sky color="#151515"></a-sky>

  <!-- 床・壁・天井 -->
  <a-plane position="0 0 0" rotation="-90 0 0" width="24" height="24" color="#2b2b2b"></a-plane>
  <a-box position="0 2.4 -8" width="14" height="5.8" depth="0.18" color="#f7f7f7"></a-box>
  <a-box position="-7 2.4 -2" rotation="0 90 0" width="12" height="5.8" depth="0.18" color="#e9e9e9"></a-box>
  <a-box position="7 2.4 -2" rotation="0 90 0" width="12" height="5.8" depth="0.18" color="#e9e9e9"></a-box>
  <a-box position="0 5.3 -2" width="14" height="0.18" depth="12" color="#1f1f1f"></a-box>

  <!-- タイトル -->
  <a-box position="0 4 -7.75" width="7.5" height="0.75" depth="0.08" color="#111111"></a-box>
  <a-text value="伊豆・いとう地魚王国 展示室"
          position="0 4.08 -7.65"
          align="center"
          color="#ffffff"
          width="6">
  </a-text>

  <a-text value="伊東の魚・加工品・料理人・事業者の魅力を紹介"
          position="0 3.45 -7.65"
          align="center"
          color="#333333"
          width="5.5">
  </a-text>

  <!-- 東平商会 -->
  <a-box position="-4 2.25 -7.65" width="3" height="1.8" depth="0.08" color="#111111"></a-box>
  <a-box position="-4 2.25 -7.55" width="2.75" height="1.55" depth="0.05" color="#ffffff"
         class="clickable"
         data-url="tohey.html">
  </a-box>
  <a-text value="東平商会"
          position="-4 2.45 -7.48"
          align="center"
          color="#111111"
          width="3">
  </a-text>
  <a-text value="さば缶・伊東ナゲットなど&#10;魚を使った商品を紹介"
          position="-4 2.05 -7.48"
          align="center"
          color="#333333"
          width="2.6">
  </a-text>

  <!-- 濱村屋 -->
  <a-box position="0 2.25 -7.65" width="3" height="1.8" depth="0.08" color="#111111"></a-box>
  <a-box position="0 2.25 -7.55" width="2.75" height="1.55" depth="0.05" color="#ffffff"
         class="clickable"
         data-url="hamamuraya.html">
  </a-box>
  <a-text value="濱村屋"
          position="0 2.45 -7.48"
          align="center"
          color="#111111"
          width="3">
  </a-text>
  <a-text value="干物づくり・地魚加工の&#10;仕事の裏側を紹介"
          position="0 2.05 -7.48"
          align="center"
          color="#333333"
          width="2.6">
  </a-text>

  <!-- 魚将 -->
  <a-box position="4 2.25 -7.65" width="3" height="1.8" depth="0.08" color="#111111"></a-box>
  <a-box position="4 2.25 -7.55" width="2.75" height="1.55" depth="0.05" color="#ffffff"
         class="clickable"
         data-url="gyosho.html">
  </a-box>
  <a-text value="魚将"
          position="4 2.45 -7.48"
          align="center"
          color="#111111"
          width="3">
  </a-text>
  <a-text value="地魚料理・商品・職人の&#10;魅力を紹介"
          position="4 2.05 -7.48"
          align="center"
          color="#333333"
          width="2.6">
  </a-text>

  <!-- 戻るボタン -->
  <a-box position="0 0.8 -7.55" width="2.5" height="0.45" depth="0.05" color="#111111"
         class="clickable"
         data-url="../index.html">
  </a-box>
  <a-text value="入口へ戻る"
          position="0 0.82 -7.48"
          align="center"
          color="#ffffff"
          width="2.5">
  </a-text>

  <!-- ライト -->
  <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
  <a-light type="spot" position="-4 4 -5.5" rotation="-35 0 0" intensity="1.2" angle="35"></a-light>
  <a-light type="spot" position="0 4 -5.5" rotation="-35 0 0" intensity="1.2" angle="35"></a-light>
  <a-light type="spot" position="4 4 -5.5" rotation="-35 0 0" intensity="1.2" angle="35"></a-light>

  <!-- カメラ -->
  <a-camera position="0 1.6 5">
    <a-cursor color="#ff6600"></a-cursor>
  </a-camera>

</a-scene>

<script>
  document.querySelectorAll('.clickable').forEach(function (el) {
    el.addEventListener('click', function () {
      const url = el.getAttribute('data-url');
      if (url) {
        window.open(url, '_self');
      }
    });
  });
</script>

</body>
</html>
